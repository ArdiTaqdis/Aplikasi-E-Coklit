<!-- ================= MODAL COKLIT ================= -->

<div id="modalCoklit" class="modal-overlay" style="display: none">
  <div class="modal-premium">
    <div class="modal-premium-header">
      <h3>🔎 Detail Pemilih</h3>
      <button onclick="closeModalCoklit()">✖</button>
    </div>

    <div class="modal-premium-body" id="detailPemilih"></div>

    <div class="modal-premium-footer">
      <select id="statusCoklit" onchange="toggleKeterangan()">
        <option value="">Pilih Status</option>
        <option value="Sudah Coklit">Pemilih Sesuai</option>
        <option value="Tersaring">Pemilih Tersaring</option>
      </select>

      <select id="ketCoklit" style="display: none">
        <option value="">Pilih Keterangan</option>
        <option>Meninggal</option>
        <option>Ganda</option>
        <option>Dibawah Umur</option>
        <option>Pindah Domisili</option>
        <option>WNA</option>
        <option>TNI</option>
        <option>Polri</option>
        <option>Data Tidak Sesuai</option>
      </select>

      <button class="btn" onclick="simpanCoklit()">Simpan</button>
    </div>
  </div>
</div>

<div id="modalDetail" class="modal-overlay" style="display: none">
  <div class="modal-premium">
    <div class="modal-premium-header">
      <div class="modal-title-flex">
        <div class="modal-icon">👤</div>
        <div>Detail Warga</div>
      </div>

      <button onclick="closeModalDetail()" class="btn ghost">Tutup</button>
    </div>

    <div class="modal-premium-body" id="detailBody">
      <!-- isi detail otomatis -->
    </div>

    <div class="modal-premium-footer">
      <button class="btn ghost" onclick="closeModalDetail()">Tutup</button>
    </div>
  </div>
</div>
