<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#d8232a" />

    <title>Database & e-COKLIT</title>

    <link rel="stylesheet" href="./style_coklit.css" />
    <link rel="stylesheet" href="./style_validasi.css" />

    <script src="api.js"></script>
  </head>

  <body class="login-mode">
    <!-- LOGIN -->
    <div id="loginWrapper">
      <div class="login-card">
        <div class="login-logo">
          <img src="logoPilkades.png" style="width: 100%" />
        </div>

        <div class="login-title">e-COKLIT PILKADES 2026</div>

        <div class="login-subtitle">Desa Kedung Jaya</div>

        <div class="login-input">
          <input id="username" type="text" placeholder="Username" />
        </div>

        <div class="login-input">
          <input id="password" type="password" placeholder="Password" />
          <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <button id="loginBtn" onclick="login()">Login</button>

        <div
          id="loginError"
          style="color: #dc2626; font-size: 12px; text-align: center"
        ></div>

        <div class="login-footer">PILKADES 2026 || Desa Kedung Jaya</div>

        <div class="install-wrapper">
          <button id="installBtn" class="btn-install">📲 Install App</button>
        </div>
      </div>
    </div>

    <!-- APP -->
    <div id="appSection" style="display: none">
      <div id="layout"></div>
      <div id="modalLayout"></div>
      <div id="modalValidasi"></div>
    </div>

    <!-- JS MODULE -->
    <script src="state.js"></script>
    <script src="wilayah.js"></script>
    <script src="modal.js"></script>
    <script src="utils.js"></script>
    <script src="kk.js"></script>
    <script src="validation.js"></script>
    <script src="tervalidasi.js"></script>
    <script src="cetak_undangan.js"></script>
    <script src="petugas.js"></script>
    <script src="config.js"></script>
    <script src="anggota.js"></script>

    <!-- =========================
LOADER HTML (FIX)
========================= -->
    <script>
      function loadHTML(id, file, callback) {
        fetch(file, { cache: "force-cache" })
          .then((res) => res.text())
          .then((html) => {
            document.getElementById(id).innerHTML = html;
            if (callback) callback();
          })
          .catch(() => {
            document.getElementById(id).innerHTML =
              "<p style='text-align:center'>⚠️ Offline mode</p>";
          });
      }
    </script>

    <script>
      /* =========================
SESSION
========================= */
      let modalReady = false;
      function checkSession() {
        console.group("🔐 CHECK SESSION");

        const session = localStorage.getItem("userSession");
        console.log("📦 Session:", session);

        if (session) {
          console.log("✅ Session ditemukan, masuk APP");

          // 🔥 MATIKAN MODE LOGIN
          document.body.classList.remove("login-mode");

          loginWrapper.style.display = "none";
          appSection.style.display = "block";

          // 🔥 STEP 1: LOAD LAYOUT
          loadHTML("layout", "layout.html", () => {
            console.log("✅ layout.html loaded");

            renderUser();

            // 🔥 STEP 2: LOAD MODAL VALIDASI DULU (PENTING)
            loadHTML("modalValidasi", "modal_validasi.html", () => {
              console.log("🔥 modal_validasi SIAP");

              // 🔥 STEP 3: LOAD MODAL LAIN
              loadHTML("modalLayout", "modal_layout.html", () => {
                console.log("🔥 modal_layout SIAP");

                // 🔥 FINAL: semua siap
                modalReady = true;
                console.log("🚀 SEMUA MODAL READY:", modalReady);

                // 🔥 INIT APP
                try {
                  initWilayah();
                  console.log("✅ initWilayah OK");
                } catch (e) {
                  console.error("❌ initWilayah error:", e);
                }

                try {
                  initApp();
                  console.log("✅ initApp OK");
                } catch (e) {
                  console.error("❌ initApp error:", e);
                }

                console.groupEnd();
              });
            });
          });
        } else {
          console.warn("❌ Tidak ada session, kembali ke login");

          // 🔥 AKTIFKAN MODE LOGIN
          document.body.classList.add("login-mode");

          loginWrapper.style.display = "flex";
          appSection.style.display = "none";

          console.groupEnd();
        }
      }

      /* =========================
LOGIN
========================= */
      function login() {
        const user = username.value.trim();
        const pass = password.value.trim();

        const btn = loginBtn;
        const err = loginError;

        err.innerText = "";

        // VALIDASI
        if (!user || !pass) {
          err.innerText = "Username & password wajib";
          return;
        }

        // LOADING
        btn.innerHTML = "Loading...";
        btn.disabled = true;

        // DEBUG (hapus kalau sudah aman)
        console.log("LOGIN:", user, pass);

        apiGet("login", {
          username: user,
          password: pass,
        })
          .then((res) => {
            console.log("RESPONSE:", res);

            btn.innerHTML = "Login";
            btn.disabled = false;

            // HANDLE ERROR RESPONSE
            if (!res || res.success === undefined) {
              err.innerText = "Response tidak valid";
              return;
            }

            if (res.success) {
              // SIMPAN SESSION
              localStorage.setItem("userSession", JSON.stringify(res.user));

              // OPTIONAL: kasih delay dikit biar smooth
              setTimeout(() => {
                checkSession();
              }, 300);
            } else {
              err.innerText = "Username atau password salah";
            }
          })
          .catch((e) => {
            console.error("LOGIN ERROR:", e);

            btn.innerHTML = "Login";
            btn.disabled = false;

            if (!navigator.onLine) {
              err.innerText = "📡 Tidak ada koneksi internet";
            } else {
              err.innerText = "⚠️ Server error";
            }
          });
      }

      /* =========================
RENDER USER
========================= */
      function renderUser() {
        const session = JSON.parse(localStorage.getItem("userSession") || "{}");

        if (session.username) {
          const el = document.getElementById("userInfo");

          if (el) {
            el.innerText = `👤 ${session.username} (${session.role}) | RW ${session.rw} RT ${session.rt}`;
          }

          // 🔥 BATASI MENU UNTUK PETUGAS
          setTimeout(() => {
            if (session.role !== "ADMIN") {
              // ❌ sembunyikan menu petugas
              const menuPetugas = document.getElementById("menuPetugas");
              if (menuPetugas) menuPetugas.style.display = "none";

              // ❌ (opsional) sembunyikan pengaturan
              const menuPengaturan = document.getElementById("menuPengaturan");
              if (menuPengaturan) menuPengaturan.style.display = "none";
            }
          }, 300); // tunggu layout load dulu
        }
      }

      /* =========================
INIT APP (LOAD DATA)
========================= */
      function initApp() {
        console.log("🚀 App loaded tanpa summary");
      }

      /* =========================
LOGOUT
========================= */
      function logout() {
        if (!confirm("Yakin logout?")) return;

        localStorage.removeItem("userSession");
        checkSession();
      }

      /* =========================
INIT
========================= */
      document.addEventListener("DOMContentLoaded", () => {
        checkSession();

        password.addEventListener("keypress", (e) => {
          if (e.key === "Enter") login();
        });
      });
    </script>

    <script>
      function togglePassword() {
        const input = document.getElementById("password");
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>
    <script>
      window.addEventListener("load", () => {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("service-worker.js")
            .then(() => console.log("✅ SW registered"))
            .catch((err) => console.error("❌ SW gagal:", err));
        }
      });

      let deferredPrompt;

      const installBtn = document.getElementById("installBtn");

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;

        if (installBtn) installBtn.style.display = "block";
      });

      if (installBtn) {
        installBtn.addEventListener("click", () => {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(() => {
            installBtn.style.display = "none";
          });
        });
      }
    </script>
  </body>
</html>
